<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PhotoNest — a high-resolution photography bookshelf." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23141110'/%3E%3Cpath d='M16 46V18h13c10 0 16 5 16 14s-6 14-16 14h-4V34h4c4 0 7-1 7-5s-3-5-7-5h-4v22z' fill='%23f2eee6'/%3E%3C/svg%3E" />
    <title>PhotoNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260626-3" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <main class="library" aria-labelledby="site-title">
      <header class="library-header">
        <p class="folio">No. 01 — 2026</p>
        <h1 id="site-title">PhotoNest</h1>
      </header>

      <section class="album-shelf" id="album-shelf" aria-label="摄影相册"></section>

      <footer class="library-footer">
        <p>High-resolution photographs, held in editions.</p>
        <p><span class="key">←</span><span class="key">→</span> 翻阅作品</p>
      </footer>
    </main>

    <section class="reader" id="reader" aria-label="摄影画册阅读器" aria-hidden="true">
      <header class="reader-header">
        <button class="text-button close-reader" id="close-reader" type="button">← 返回书架</button>
        <p class="reader-title" id="reader-title"></p>
        <button class="text-button" id="download-button" type="button">下载原图 <span>↓</span></button>
      </header>

      <div class="reader-stage">
        <button class="page-hit prev" id="previous-page" type="button" aria-label="上一页"></button>
        <figure class="photo-page" id="photo-page">
          <div class="image-frame"><img id="reader-image" alt="" /></div>
          <figcaption>
            <span id="photo-caption"></span>
            <span id="photo-details"></span>
          </figcaption>
        </figure>
        <button class="page-hit next" id="next-page" type="button" aria-label="下一页"></button>
      </div>

      <footer class="reader-footer">
        <p id="album-description"></p>
        <p class="pagination"><span id="current-page">01</span> / <span id="total-pages">01</span></p>
      </footer>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
    <script src="./app.js?v=20260626-3"></script>
  </body>
</html>
