name: Deploy PhotoNest to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='assets/gallery/' \
            ./ _site/
          find assets/gallery -type d -name thumbs | while read -r dir; do
            mkdir -p "_site/$dir"
            rsync -a "$dir/" "_site/$dir/"
          done
          find assets/gallery -type f \( -name 'cover*.jpg' -o -name 'cover*.jpeg' -o -name 'cover*.png' \) | while read -r file; do
            mkdir -p "_site/$(dirname "$file")"
            cp "$file" "_site/$file"
          done
          touch _site/.nojekyll
      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy PhotoNest ${GITHUB_SHA}"
          git branch -M gh-pages
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
